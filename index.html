<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>our little secret <3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}


body{

    font-family:'Inter',sans-serif;

    background:#fff;

    color:#222;

}



@font-face{

    font-family:'BrittanySignature';

    src:url('BrittanySignature.ttf') format('truetype');

}




section{

    min-height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:40px 25px;

}





h1{

    font-size:clamp(3rem,7vw,5rem);

    font-weight:600;

    letter-spacing:-0.04em;

    line-height:1.15;

}

.intro-title{

    font-size:clamp(2rem,5vw,3.5rem);

}



h2{

    font-size:clamp(2rem,5vw,3rem);

    font-weight:500;

}



p{

    margin-top:25px;

    font-size:1.15rem;

    color:#777;

    line-height:1.7;

}





.arrow{

    margin-top:70px;

    font-size:2rem;

    color:#bbb;

    cursor:pointer;

    animation:bounce 2s infinite;

}


body.lock-scroll{
    overflow:hidden;
}



@keyframes bounce{

0%,20%,50%,80%,100%{

    transform:translateY(0);

}

40%{

    transform:translateY(12px);

}

60%{

    transform:translateY(6px);

}

}





/* Section reveal */

.fade{

    opacity:0;

    transform:translateY(40px);

    transition:opacity 1s ease, transform 1s ease;

}



.fade.visible{

    opacity:1;

    transform:translateY(0);

}


.celebration-gif{

    width:min(350px,80vw);

    margin-top:40px;

    border-radius:18px;

}






/* Photos */

.memory-photos{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:18px;

    width:min(700px,90vw);

    margin-top:55px;

}



.memory-photo{

    width:200px;

    height:200px;

    object-fit:cover;

    border-radius:16px;

    opacity:0;

    transform:translateY(30px);

    transition:

        opacity 1s ease,

        transform 1s ease;

}



.memory-photo.show{

    opacity:1;

    transform:translateY(0);

}






/* Sonogram */

.sonogram-video{

    width:min(420px,90vw);

    border-radius:18px;

    box-shadow:0 20px 50px rgba(0,0,0,.12);

}



.reveal-date{

    margin-top:35px;

    font-size:.95rem;

    color:#999;

    letter-spacing:.1em;

    opacity:0;

    transform:translateY(20px);

    transition:opacity 1.5s ease, transform 1.5s ease;


}

.reveal-date.show{

    opacity:1;

    transform:translateY(0);

}


.reveal-arrow{

    opacity:0;

    pointer-events:none;

    transition:opacity 1s ease;

}



.reveal-arrow.show{

    opacity:1;

    pointer-events:auto;

}






/* Baby shower */

.card{

    border:none;

    padding:55px 45px;

    max-width:500px;

}



.small{

    margin-top:30px;

    font-size:.95rem;

    color:#aaa;

}






/* Signature */

.signature{

    margin-top:20px;

    font-family:'BrittanySignature',cursive;

    font-size:clamp(3rem,12vw,4.5rem);

    color:#555;

}




.footer{

    min-height:70vh;

    padding-bottom:100px;

}

.final-photo{

    width:min(350px,80vw);

    border-radius:18px;

    margin-bottom:35px;

    opacity:0;

    transform:translateY(30px);

    transition:opacity 3s ease, transform 3s ease;

}

.footer.visible .final-photo{

    opacity:1;

    transform:translateY(0);

}





audio{

    display:none;

}





@media(max-width:600px){

    .memory-photo{

        width:150px;

        height:150px;

    }

}


</style>

</head>

<body>


<!-- Background Music -->

<audio id="background-music" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>





<!-- Opening Screen -->

<section id="opening">


<h1>
hey :)
</h1>



<div

class="arrow"

onclick="beginExperience()">

↓

</div>


</section>






<!-- Memories -->

<section id="intro">


<h1 class="intro-title">
a lot has happened<br>
this year
</h1>




<div class="memory-photos">

<img src="photo1.jpg" class="memory-photo">

<img src="photo3.jpg" class="memory-photo">

<img src="photo5.jpg" class="memory-photo">

<img src="photo2.jpg" class="memory-photo">

<img src="photo4.jpg" class="memory-photo">

<img src="photo6.jpg" class="memory-photo">

</div>




<div

class="arrow"

onclick="scrollToSection('secret')">

↓

</div>


</section>







<!-- Secret -->

<section class="fade" id="secret">


<h1>

the best part...

</h1>



<p>

we haven't told you yet

</p>



<div

class="arrow"

onclick="scrollToSection('reveal')">

↓

</div>


</section>







<!-- Ultrasound Reveal -->

<section class="fade" id="reveal">


<video

id="sonogram-video"

class="sonogram-video"

muted

loop

playsinline

poster="sonogram.jpg">


<source src="sonogram.mp4" type="video/mp4">


</video>



<p class="reveal-date hidden">

coming january 2027

</p>



<div

id="sonogram-arrow"

class="arrow reveal-arrow"

onclick="scrollToSection('celebrate')">

↓

</div>


</section>







<!-- Celebration -->

<section class="fade" id="celebrate">


<h2>

we can't wait to celebrate

</h2>

<img 
src="celebration.gif"
class="celebration-gif"
alt="celebration">




<div

class="arrow"

onclick="scrollToSection('shower')">

↓

</div>


</section>







<!-- Baby Shower -->

<section class="fade" id="shower">


<div class="card">


<h2>

baby shower

</h2>



<p>

date/location: coming soon

</p>



<div class="small">

details will be updated here

</div>


</div>



<div

class="arrow"

onclick="scrollToSection('footer')">

↓

</div>


</section>







<!-- Closing -->

<section class="fade footer" id="footer">

<img 
src="photo7.jpg"
class="final-photo"
alt="Ellie and Wayne">


<div>

♡

</div>



<div class="signature">

ellie and wayne

</div>


</section>



<script>


/* =========================
   Navigation
========================= */

document.body.classList.add("lock-scroll");


function beginExperience(){

    document.body.classList.remove("lock-scroll");

    startMusic();

    scrollToSection("intro");

}



function scrollToSection(id){

    document
    .getElementById(id)
    .scrollIntoView({

        behavior:"smooth"

    });

}






/* =========================
   Background Music
========================= */


const music = document.getElementById("background-music");

let musicStarted = false;



function startMusic(){


    if(musicStarted){

        return;

    }


    musicStarted = true;


    music.volume = 0;


    music.play();



    let volume = 0;



    const fadeIn = setInterval(()=>{


        if(volume < 0.2){


            volume += 0.01;

            music.volume = volume;


        }
        else{


            clearInterval(fadeIn);


        }


    },100);


}








/* =========================
   Fade Sections
========================= */


const sectionObserver = new IntersectionObserver(

(entries)=>{


entries.forEach(entry=>{


    if(entry.isIntersecting){


        entry.target.classList.add("visible");


    }


});


},

{

threshold:0.25

}

);



document

.querySelectorAll(".fade")

.forEach(section=>{


sectionObserver.observe(section);


});







/* =========================
   Memory Photos
========================= */

/* =========================
   Memory Photos
========================= */


/* =========================
   Memory Photos
========================= */


const photos = document.querySelectorAll(".memory-photo");

const photoContainer = document.querySelector(".memory-photos");


let photosShown = false;



const photoObserver = new IntersectionObserver(


(entries)=>{


entries.forEach(entry=>{


    if(entry.isIntersecting && !photosShown){


        photosShown = true;



        photos.forEach((photo,index)=>{


            setTimeout(()=>{


                photo.classList.add("show");


            }, index * 950);



        });



        photoObserver.disconnect();


    }


});


},

{

threshold:0.3

}


);



photoObserver.observe(photoContainer);








/* =========================
   Sonogram Video
========================= */


const video = document.getElementById("sonogram-video");

const sonogramArrow = document.getElementById("sonogram-arrow");

const revealDate = document.querySelector(".reveal-date");


let videoStarted = false;



/*

When the reveal section becomes visible:
- start the sonogram
- wait 7 seconds
- show arrow

*/


const videoObserver = new IntersectionObserver(


(entries)=>{


entries.forEach(entry=>{


if(entry.isIntersecting && !videoStarted){


    videoStarted = true;


    video.play();



    // Show date after 3 seconds

    setTimeout(()=>{

        revealDate.classList.add("show");

    },3000);



    // Show arrow after 7 seconds

    setTimeout(()=>{

        sonogramArrow.classList.add("show");

    },7000);


}



});


},

{

threshold:0.5

}

);



videoObserver.observe(document.getElementById("reveal"));





</script>


</body>

</html>
